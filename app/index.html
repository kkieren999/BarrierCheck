<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BarrierCheck App</title>
  <link rel="canonical" href="https://barriercheck.com.au/app/" />
  <style>
    html, body { margin: 0; min-height: 100%; background: #f7fcff; color: #03286a; font: 700 16px system-ui, sans-serif; }
    .loading { min-height: 100vh; display: grid; place-items: center; padding: 24px; text-align: center; }
    .loading-card { width: min(420px, 100%); padding: 28px; border-radius: 28px; background: #fff; box-shadow: 0 20px 60px rgba(3,40,106,.12); }
    .loading-card p { margin: 8px 0 0; color: #52657e; }
    .loading-card a { color: #0d82d8; }
  </style>
</head>
<body>
  <div class="loading">
    <div class="loading-card">
      <strong>Opening BarrierCheck…</strong>
      <p>Loading the inspection app.</p>
    </div>
  </div>

  <script>
    (function () {
      var source = "/BarrierCheck_APP/app/index.html?v=20260628barriercheck32290";
      fetch(source, { cache: "no-store" })
        .then(function (response) {
          if (!response.ok) throw new Error("Could not load the BarrierCheck app.");
          return response.text();
        })
        .then(function (html) {
          var baseTag = '<base href="/BarrierCheck_APP/app/">';
          var configScript = '<script defer src="/BarrierCheck_APP/app/firebase-config.js?v=20260628barriercheck32290"><\\/script>';
          html = html.replace('<head>', '<head>\n' + baseTag);
          html = html.replace('</head>', configScript + '\n</head>');
          document.open();
          document.write(html);
          document.close();
          if (window.history && window.history.replaceState) {
            window.history.replaceState(null, '', '/app/' + window.location.search + window.location.hash);
          }
        })
        .catch(function (error) {
          document.body.innerHTML = '<div class="loading"><div class="loading-card"><strong>Could not open BarrierCheck.</strong><p>' + error.message + '</p><p><a href="/app/login/">Return to login</a></p></div></div>';
        });
    })();
  </script>

  <noscript>
    <div class="loading">
      <div class="loading-card">
        <strong>JavaScript is required to use BarrierCheck.</strong>
        <p><a href="/app/login/">Return to login</a></p>
      </div>
    </div>
  </noscript>
</body>
</html>
